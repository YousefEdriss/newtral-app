name: Best Cars Dealership CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test-django:
    name: Django Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        working-directory: ./server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system checks
        working-directory: ./server
        run: |
          python manage.py check

      - name: Run Django migrations (dry run)
        working-directory: ./server
        run: |
          python manage.py migrate --run-syncdb

  lint-node:
    name: Node.js Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install database service dependencies
        working-directory: ./database
        run: npm install

      - name: Verify database service entry point
        working-directory: ./database
        run: node --check app.js

  lint-sentiment:
    name: Sentiment Analyzer Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install sentiment analyzer dependencies
        working-directory: ./sentiment_analyzer
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check sentiment analyzer
        working-directory: ./sentiment_analyzer
        run: python -m py_compile app.py && echo "Syntax OK"

  build-docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [lint-and-test-django, lint-node, lint-sentiment]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Django image
        run: docker build -t bestcars-django ./server

      - name: Build Database service image
        run: docker build -t bestcars-database ./database

      - name: Build Sentiment analyzer image
        run: docker build -t bestcars-sentiment ./sentiment_analyzer
