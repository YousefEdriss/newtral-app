[build]
  command = "npm run build"
  publish = "dist"

# Proxy API calls to the Django backend
[[redirects]]
  from = "/api/*"
  to = "https://newtral-backend.onrender.com/api/:splat"
  status = 200
  force = true

# Proxy media (uploaded images) to backend
[[redirects]]
  from = "/media/*"
  to = "https://newtral-backend.onrender.com/media/:splat"
  status = 200
  force = true

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
